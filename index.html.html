<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 여성주의 예배 컨퍼런스: 공명(RESONANCE)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            scroll-behavior: smooth;
            overflow-x: hidden;
            background-color: #ffffff;
        }

        .resonance-bg {
            background: 
                radial-gradient(circle at 0% 0%, rgba(216, 180, 254, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 100% 0%, rgba(249, 168, 212, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(191, 219, 254, 0.1) 0%, transparent 60%);
            position: relative;
            min-height: 100vh;
        }

        .bg-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.4;
            pointer-events: none;
        }

        .resonance-text {
            color: #6332a8;
            font-weight: 900;
            line-height: 1;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }

        .resonance-letter {
            display: inline-block;
            animation: resonance-wave 5s ease-in-out infinite;
        }

        @keyframes resonance-wave {
            0%, 100% { transform: translateX(0) rotate(0deg); }
            50% { transform: translateX(8px) rotate(1.5deg); }
        }

        .speaker-card {
            background: white;
            padding: 10px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
            position: relative;
        }
        .speaker-card:hover { transform: translateY(-10px); }

        .speaker-img-container {
            width: 100%;
            aspect-ratio: 1 / 1.1;
            overflow: hidden;
            border-radius: 15px;
            background-color: #f3f4f6;
            margin-bottom: 15px;
        }

        .speaker-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* 사진 상단이 잘리지 않도록 상단 정렬 추가 */
            object-position: top center;
            cursor: pointer;
        }

        .speaker-info-box {
            background-color: #e5e7eb;
            padding: 10px;
            border-radius: 8px;
            text-align: left;
        }

        .info-label {
            background-color: #4b2b84;
            color: white;
            padding: 4px 12px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.875rem;
            min-width: 80px;
            text-align: center;
        }

        .logo-visible {
            filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
        }
        
        .fade-in {
            animation: fadeIn 0.8s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hidden-view { display: none; }

        .admin-edit-outline {
            outline: 2px dashed #8b5cf6;
            outline-offset: 4px;
            cursor: pointer;
        }
        
        .remove-btn {
            position: absolute;
            top: -10px;
            right: -10px;
            background: #ef4444;
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            z-index: 10;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        #toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
        }

        #admin-modal-overlay {
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
        }

        #admin-panel {
            transition: transform 0.3s ease;
            transform: translateY(100%);
        }
        #admin-panel.open {
            transform: translateY(0);
        }
    </style>
</head>
<body class="resonance-bg">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let contentData = {
            subtitle: "2026 여성주의 예배 컨퍼런스",
            mainTitle: "마음과 마음이 통하다: 공명",
            description: "여성주의가 여는 예배와 삶의 대화",
            speakers: [
                { id: "s1", name: "최희안 교수", school: "Boston University", major: "Practical Theology", img: "https://i.ifh.cc/9vF9jW.jpg" },
                { id: "s2", name: "박희규 교수", school: "이화여자대학교", major: "목회상담심리학", img: "https://i.ifh.cc/QQRMlN.jpg" },
                { id: "s3", name: "구아름 교수", school: "실천신학대학원대학교", major: "설교학", img: "https://i.ifh.cc/O85ON4.jpg" }
            ],
            info: {
                day1: "2026.04.27(월) 초동교회",
                address: "(종로구 돈화문로 5가길 23)",
                day2: "2026.04.28(화) 온라인",
                footer: '"마음과 마음이 통하는 공명의 시간에 초대합니다."'
            },
            assets: {
                scheduleImg: "https://i.ifh.cc/tMaowp.jpg",
                qrImg: "https://i.ifh.cc/rXfNWv.png",
                applyLink: "https://docs.google.com/forms/d/e/1FAIpQLSfOfBMXDHoObjeTnSmbmif_ONivyOfgcIStiwGPeysr5EpQdw/viewform?usp=header",
                hostLogo1: "https://i.ifh.cc/Mafo0R.png",
                hostLogo2: "https://i.ifh.cc/pX8Fpf.png",
                sponsorLogo1: "https://i.ifh.cc/wr70QT.png",
                sponsorLogo2: "https://i.ifh.cc/pX8Fpf.png",
                sponsorLink1: "https://ifh.cc/v-wr70QT"
            }
        };

        let isAdmin = false;
        let isEditing = false;
        let db, auth, contentDocRef, appId;

        const initFirebase = async () => {
            try {
                if (typeof __firebase_config === 'undefined') return;
                const firebaseConfig = JSON.parse(__firebase_config);
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
                contentDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'siteContent', 'landingPage');

                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                onAuthStateChanged(auth, (user) => {
                    if (user) setupSync(user);
                });
            } catch (err) {
                console.warn("Firebase Error - Running in local mode", err);
            }
        };

        const setupSync = (user) => {
            if (!user || !contentDocRef) return;
            onSnapshot(contentDocRef, (docSnap) => {
                if (docSnap.exists()) {
                    contentData = docSnap.data();
                    renderContent();
                } else {
                    setDoc(contentDocRef, contentData).catch(err => console.error("Init Error", err));
                }
            }, (err) => console.error("Sync Error", err));
        };

        const showToast = (msg) => {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.remove('hidden');
            setTimeout(() => { toast.classList.add('hidden'); }, 3000);
        };

        const renderContent = () => {
            document.getElementById('display-subtitle').innerText = contentData.subtitle || "";
            document.getElementById('display-maintitle').innerText = contentData.mainTitle || "";
            document.getElementById('display-description').innerText = contentData.description || "";
            document.getElementById('display-day1').innerText = contentData.info?.day1 || "";
            document.getElementById('display-address').innerText = contentData.info?.address || "";
            document.getElementById('display-day2').innerText = contentData.info?.day2 || "";
            document.getElementById('display-footer-msg').innerText = contentData.info?.footer || "";

            document.getElementById('main-schedule-img').src = contentData.assets.scheduleImg;
            document.getElementById('main-qr-img').src = contentData.assets.qrImg;
            document.getElementById('main-apply-link').href = contentData.assets.applyLink;
            document.getElementById('main-host-logo1').src = contentData.assets.hostLogo1;
            document.getElementById('main-host-logo2').src = contentData.assets.hostLogo2;
            document.getElementById('main-sponsor-logo1').src = contentData.assets.sponsorLogo1;
            document.getElementById('main-sponsor-logo2').src = contentData.assets.sponsorLogo2;
            document.getElementById('main-sponsor-link1').href = contentData.assets.sponsorLink1;

            const speakerContainer = document.getElementById('speaker-grid');
            speakerContainer.innerHTML = '';
            if (contentData.speakers) {
                contentData.speakers.forEach((s, idx) => {
                    const card = document.createElement('div');
                    card.className = 'speaker-card';
                    card.innerHTML = `
                        ${isEditing ? `<div class="remove-btn" onclick="removeSpeaker('${s.id}')">×</div>` : ''}
                        <div class="speaker-img-container">
                            <img src="${s.img}" alt="${s.name}" onclick="editImagePrompt('speakers.${idx}.img')" style="object-position: top center;" referrerpolicy="no-referrer">
                        </div>
                        <div class="speaker-info-box">
                            <p class="font-bold text-gray-800 edit-field" data-path="speakers.${idx}.name">${s.name}</p>
                            <p class="text-xs text-gray-600 edit-field" data-path="speakers.${idx}.school">${s.school}</p>
                            <p class="text-xs text-gray-600 edit-field" data-path="speakers.${idx}.major">${s.major}</p>
                        </div>
                    `;
                    speakerContainer.appendChild(card);
                });
            }
            
            if (isEditing) {
                const addBtn = document.createElement('div');
                addBtn.className = 'speaker-card flex items-center justify-center border-2 border-dashed border-purple-300 cursor-pointer hover:bg-purple-50 min-h-[250px]';
                addBtn.onclick = addSpeaker;
                addBtn.innerHTML = `<span class="text-4xl text-purple-300">+</span>`;
                speakerContainer.appendChild(addBtn);
            }

            applyAdminOverlay();

            if (isEditing) {
                document.getElementById('input-schedule-img').value = contentData.assets.scheduleImg;
                document.getElementById('input-qr-img').value = contentData.assets.qrImg;
                document.getElementById('input-apply-link').value = contentData.assets.applyLink;
            }
        };

        const applyAdminOverlay = () => {
            const fields = document.querySelectorAll('.edit-field');
            fields.forEach(el => {
                if (isEditing) {
                    el.contentEditable = "true";
                    el.classList.add('admin-edit-outline');
                } else {
                    el.contentEditable = "false";
                    el.classList.remove('admin-edit-outline');
                }
            });
            
            if (isEditing) document.body.classList.add('admin-active');
            else document.body.classList.remove('admin-active');
        };

        window.addSpeaker = () => {
            const newId = 's' + Date.now();
            contentData.speakers.push({
                id: newId,
                name: "새 강사 이름",
                school: "소속 학교",
                major: "전공",
                img: "https://via.placeholder.com/300x330?text=New+Speaker"
            });
            renderContent();
            showToast("새 강사가 추가되었습니다.");
        };

        window.removeSpeaker = (id) => {
            if (!confirm("이 강사 정보를 삭제하시겠습니까?")) return;
            contentData.speakers = contentData.speakers.filter(s => s.id !== id);
            renderContent();
        };

        window.editImagePrompt = (path) => {
            if (!isEditing) return;
            const newUrl = prompt("이미지 URL을 입력하세요:", getPathValue(contentData, path));
            if (newUrl) {
                setPathValue(contentData, path, newUrl.trim());
                renderContent();
            }
        };

        const getPathValue = (obj, path) => path.split('.').reduce((acc, part) => acc && acc[part], obj);
        const setPathValue = (obj, path, value) => {
            const parts = path.split('.');
            const last = parts.pop();
            const deep = parts.reduce((acc, part) => acc[part], obj);
            if (deep) deep[last] = value;
        };

        window.openAdminModal = () => {
            if (isAdmin) {
                isAdmin = false;
                isEditing = false;
                document.getElementById('admin-icon').classList.remove('text-purple-400');
                document.getElementById('admin-save-btn').classList.add('hidden');
                document.getElementById('admin-edit-btn').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('open');
                showToast("관리자 모드가 종료되었습니다.");
                renderContent();
            } else {
                document.getElementById('admin-modal-overlay').classList.remove('hidden');
                document.getElementById('admin-password-input').focus();
            }
        };

        window.closeAdminModal = () => {
            document.getElementById('admin-modal-overlay').classList.add('hidden');
            document.getElementById('admin-password-input').value = "";
        };

        window.checkAdminPassword = () => {
            const input = document.getElementById('admin-password-input').value.trim();
            if (input === "gspt2026") {
                isAdmin = true;
                document.getElementById('admin-icon').classList.add('text-purple-400');
                document.getElementById('admin-save-btn').classList.remove('hidden');
                document.getElementById('admin-edit-btn').classList.remove('hidden');
                closeAdminModal();
                showToast("관리자 모드가 활성화되었습니다.");
            } else {
                showToast("비밀번호가 틀렸습니다.");
                document.getElementById('admin-password-input').value = "";
            }
        };

        window.toggleEditing = () => {
            isEditing = !isEditing;
            document.getElementById('admin-edit-btn').innerText = isEditing ? "편집 종료" : "내용 편집 시작";
            document.getElementById('admin-panel').classList.toggle('open', isEditing);
            renderContent();
            if (isEditing) showToast("편집 모드가 활성화되었습니다.");
        };

        window.saveChanges = async () => {
            if (!contentDocRef) {
                showToast("DB 연결이 없어 로컬에만 유지됩니다.");
                return;
            }
            
            const fields = document.querySelectorAll('.edit-field');
            fields.forEach(field => {
                const path = field.getAttribute('data-path');
                const value = field.innerText.trim();
                setPathValue(contentData, path, value);
            });

            contentData.assets.scheduleImg = document.getElementById('input-schedule-img').value.trim();
            contentData.assets.qrImg = document.getElementById('input-qr-img').value.trim();
            contentData.assets.applyLink = document.getElementById('input-apply-link').value.trim();

            try {
                await updateDoc(contentDocRef, contentData);
                showToast("성공적으로 저장되었습니다.");
                isEditing = false;
                document.getElementById('admin-edit-btn').innerText = "내용 편집 시작";
                document.getElementById('admin-panel').classList.remove('open');
                renderContent();
            } catch (err) {
                console.error("Save error", err);
                showToast("저장 실패");
            }
        };

        window.toggleView = (view) => {
            const main = document.getElementById('main-view');
            const schedule = document.getElementById('schedule-view');
            if (view === 'schedule') {
                main.classList.add('hidden-view');
                schedule.classList.remove('hidden-view');
                schedule.classList.add('fade-in');
            } else {
                schedule.classList.add('hidden-view');
                main.classList.remove('hidden-view');
                main.classList.add('fade-in');
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.onload = async () => {
            renderContent();
            await initFirebase();
            document.getElementById('admin-password-input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') checkAdminPassword();
            });
        };
    </script>

    <div class="fixed bottom-6 right-6 z-50 flex flex-col gap-2 items-end">
        <button id="admin-save-btn" onclick="saveChanges()" class="hidden px-6 py-3 bg-green-600 text-white rounded-2xl shadow-xl font-bold hover:bg-green-700 transition-all border-2 border-white">변경사항 저장</button>
        <button id="admin-edit-btn" onclick="toggleEditing()" class="hidden px-6 py-3 bg-purple-600 text-white rounded-2xl shadow-xl font-bold hover:bg-purple-700 transition-all border-2 border-white">내용 편집 시작</button>
        <button onclick="openAdminModal()" class="p-4 bg-gray-800 text-white rounded-full shadow-lg hover:bg-black transition-all flex items-center justify-center border-2 border-white" title="관리자 설정">
            <svg id="admin-icon" class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
        </button>
    </div>

    <div id="admin-panel" class="fixed bottom-0 left-0 right-0 bg-white shadow-2xl z-[40] rounded-t-[40px] p-8 border-t border-purple-100 max-h-[80vh] overflow-y-auto">
        <h3 class="text-2xl font-bold text-purple-800 mb-6">고급 설정 관리</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div>
                <label class="block text-sm font-bold text-gray-600 mb-2">시간표 이미지 주소</label>
                <input id="input-schedule-img" type="text" class="w-full px-4 py-3 bg-gray-50 border rounded-xl">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-600 mb-2">QR 코드 이미지 주소</label>
                <input id="input-qr-img" type="text" class="w-full px-4 py-3 bg-gray-50 border rounded-xl">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-600 mb-2">신청 폼 주소 (URL)</label>
                <input id="input-apply-link" type="text" class="w-full px-4 py-3 bg-gray-50 border rounded-xl">
            </div>
        </div>
    </div>

    <div id="admin-modal-overlay" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[32px] shadow-2xl overflow-hidden animate-fade-in">
            <div class="p-8 text-center">
                <div class="w-16 h-16 bg-purple-100 text-purple-600 rounded-full flex items-center justify-center mx-auto mb-6">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                    </svg>
                </div>
                <h3 class="text-xl font-bold text-gray-800 mb-2">관리자 로그인</h3>
                <p class="text-gray-500 mb-6">비밀번호를 입력해 주세요.</p>
                <input id="admin-password-input" type="password" placeholder="비밀번호" class="w-full px-6 py-4 bg-gray-100 border-none rounded-2xl mb-4 focus:ring-2 focus:ring-purple-500 focus:outline-none text-center text-lg tracking-widest">
                <div class="flex gap-3">
                    <button onclick="closeAdminModal()" class="flex-1 px-6 py-3 bg-gray-200 text-gray-600 font-bold rounded-xl hover:bg-gray-300 transition-colors">취소</button>
                    <button onclick="checkAdminPassword()" class="flex-1 px-6 py-3 bg-purple-600 text-white font-bold rounded-xl hover:bg-purple-700 transition-colors shadow-lg">확인</button>
                </div>
            </div>
        </div>
    </div>

    <div class="bg-lines">
        <svg width="100%" height="100%" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
            <path d="M-100,200 Q400,0 1100,300" stroke="#d8b4fe" fill="none" stroke-width="1" />
            <path d="M-100,500 Q500,800 1100,400" stroke="#fbcfe8" fill="none" stroke-width="1" />
            <circle cx="900" cy="100" r="150" fill="none" stroke="#e0e7ff" stroke-width="0.5" />
        </svg>
    </div>

    <div id="main-view" class="fade-in">
        <div class="max-w-5xl mx-auto px-6 pt-24 pb-20">
            <header class="text-center mb-16">
                <p id="display-subtitle" class="text-xl md:text-2xl text-purple-700 font-medium mb-4 edit-field" data-path="subtitle">2026 여성주의 예배 컨퍼런스</p>
                <h2 id="display-maintitle" class="text-3xl md:text-4xl font-bold text-gray-800 mb-6 edit-field" data-path="mainTitle">마음과 마음이 통하다: 공명</h2>
                <h1 class="resonance-text text-7xl md:text-9xl mb-12">
                    <span class="resonance-letter">R</span><span class="resonance-letter">E</span><span class="resonance-letter">S</span><span class="resonance-letter">O</span><span class="resonance-letter">N</span><span class="resonance-letter">A</span><span class="resonance-letter">N</span><span class="resonance-letter">C</span><span class="resonance-letter">E</span>
                </h1>
                <div id="display-description" class="inline-block px-10 py-3 bg-white/80 border border-purple-200 text-purple-900 rounded-full font-bold text-xl shadow-sm edit-field" data-path="description">여성주의가 여는 예배와 삶의 대화</div>
            </header>

            <div id="speaker-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mb-24">
                <!-- Speakers will be rendered here via JS -->
            </div>

            <div class="text-center mb-16">
                <button onclick="toggleView('schedule')" class="group relative inline-flex items-center gap-3 px-8 py-4 bg-white border-2 border-purple-600 text-purple-700 font-bold rounded-2xl hover:bg-purple-600 hover:text-white transition-all duration-300 shadow-lg overflow-hidden">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                    컨퍼런스 시간표 →
                </button>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-5 gap-12 items-center bg-purple-50/50 p-8 md:p-12 rounded-[40px] border border-white">
                <div class="lg:col-span-3 space-y-6">
                    <div class="flex items-start gap-4">
                        <span class="info-label shrink-0">일시 및 장소</span>
                        <div class="text-xl text-gray-700">
                            <p><span id="display-day1" class="font-bold edit-field" data-path="info.day1"></span> <span id="display-address" class="text-sm text-gray-500 font-normal ml-2 edit-field" data-path="info.address"></span></p>
                            <p id="display-day2" class="font-bold edit-field" data-path="info.day2"></p>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="info-label shrink-0">주 관</span>
                        <div class="flex flex-wrap items-center gap-6">
                            <img id="main-host-logo1" src="" alt="주관 로고 1" class="h-10 w-auto logo-visible cursor-pointer" onclick="editImagePrompt('assets.hostLogo1')" referrerpolicy="no-referrer">
                            <img id="main-host-logo2" src="" alt="주관 로고 2" class="h-10 w-auto logo-visible cursor-pointer" onclick="editImagePrompt('assets.hostLogo2')" referrerpolicy="no-referrer">
                        </div>
                    </div>
                    <div class="flex items-start gap-4">
                        <span class="info-label shrink-0">후 원</span>
                        <div class="flex flex-wrap items-center gap-8 pt-1">
                            <a id="main-sponsor-link1" href="" target="_blank">
                                <img id="main-sponsor-logo1" src="" alt="후원 로고 1" class="h-16 w-auto logo-visible cursor-pointer" onclick="event.preventDefault(); editImagePrompt('assets.sponsorLogo1')" referrerpolicy="no-referrer">
                            </a>
                            <img id="main-sponsor-logo2" src="" alt="후원 로고 2" class="h-16 w-auto logo-visible cursor-pointer" onclick="editImagePrompt('assets.sponsorLogo2')" referrerpolicy="no-referrer">
                        </div>
                    </div>
                </div>
                <div class="lg:col-span-2 text-center bg-white p-8 rounded-3xl shadow-xl">
                    <p class="text-purple-800 font-bold mb-4">참가 신청 QR</p>
                    <div class="bg-white w-48 h-48 mx-auto mb-6">
                        <img id="main-qr-img" src="" alt="참가 신청 QR" class="w-full h-full object-contain cursor-pointer" onclick="editImagePrompt('assets.qrImg')" referrerpolicy="no-referrer">
                    </div>
                    <a id="main-apply-link" href="" target="_blank" class="block w-full bg-purple-800 text-white font-bold py-4 rounded-xl hover:bg-purple-900 transition-colors shadow-lg">온라인 신청서 작성하기</a>
                </div>
            </div>
        </div>
    </div>

    <div id="schedule-view" class="hidden-view">
        <div class="max-w-4xl mx-auto px-6 py-20 text-center">
            <h2 class="text-3xl font-bold text-purple-900 mb-10">컨퍼런스 시간표</h2>
            <div class="bg-white p-4 rounded-3xl shadow-2xl mb-12 inline-block">
                <img id="main-schedule-img" src="" alt="시간표" class="max-w-full h-auto rounded-2xl cursor-pointer" onclick="editImagePrompt('assets.scheduleImg')" referrerpolicy="no-referrer">
            </div>
            <div class="mt-8">
                <button onclick="toggleView('main')" class="inline-flex items-center justify-center w-16 h-16 bg-purple-800 text-white rounded-full shadow-xl hover:scale-110 transform transition-all">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0 a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                </button>
            </div>
        </div>
    </div>

    <footer class="text-center py-10 border-t border-gray-100">
        <p id="display-footer-msg" class="text-gray-400 text-sm italic edit-field" data-path="info.footer">"마음과 마음이 통하는 공명의 시간에 초대합니다."</p>
    </footer>

    <div id="toast" class="hidden bg-gray-800 text-white px-6 py-3 rounded-full shadow-2xl z-[200]"></div>
</body>
</html>
