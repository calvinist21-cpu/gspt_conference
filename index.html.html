<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>컨퍼런스</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            margin: 0;
            padding: 0;
            /* 배경 이미지를 고정하여 세련된 느낌 유지 */
            background-image: linear-gradient(rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.9)), url('https://i.ifh.cc/g4yO77.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .content-card {
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }

        .img-shadow {
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border-radius: 12px;
            transition: transform 0.3s ease;
        }

        .img-shadow:hover {
            transform: translateY(-5px);
        }

        /* Smooth Scroll */
        html {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body class="text-gray-800 antialiased">

    <div class="min-h-screen py-12 px-4 md:px-0">
        <div class="max-w-4xl mx-auto space-y-12">
            
            <!-- 1. 포스터 섹션 (Poster) -->
            <section class="content-card p-4 md:p-8 text-center">
                <div class="flex justify-center">
                    <img src="https://i.ifh.cc/g4yO77.jpg" alt="컨퍼런스 포스터" class="img-shadow max-w-full h-auto" onerror="this.src='https://via.placeholder.com/800x1100?text=포스터+이미지'">
                </div>
            </section>

            <!-- 2. 시간표 섹션 (Schedule) -->
            <section class="content-card p-4 md:p-8 text-center">
                <h2 class="text-2xl md:text-3xl font-bold mb-6 text-indigo-900">프로그램 시간표</h2>
                <div class="flex justify-center">
                    <img src="https://i.ifh.cc/XbGxCF.jpg" alt="시간표 안내" class="img-shadow max-w-full h-auto" onerror="this.src='https://via.placeholder.com/800x1200?text=시간표+이미지'">
                </div>
            </section>

            <!-- 3. 참가 신청 섹션 (Registration) -->
            <section class="content-card p-8 md:p-16 text-center bg-indigo-900 text-white">
                <h2 class="text-3xl md:text-4xl font-bold mb-10">참가 신청하기</h2>
                
                <!-- 문구 삭제됨 -->
                
                <a href="https://docs.google.com/forms/d/e/1FAIpQLSfOfBMXDHoObjeTnSmbmif_ONivyOfgcIStiwGPeysr5EpQdw/viewform?usp=header" 
                   target="_blank"
                   class="inline-block bg-white text-indigo-900 text-xl font-bold py-5 px-14 rounded-2xl transition duration-300 transform hover:scale-105 hover:bg-yellow-400 shadow-2xl">
                    온라인 신청서 작성
                </a>
            </section>

        </div>
    </div>

</body>
</html>
